test_cases:
  - test_case: cancellation_mid_transfer_pops_the_flow
    fixtures:
      - authenticated_user
    steps:
      - user: I'd like to make a transfer
        assertions:
          - flow_started:
              operator: all
              flow_ids:
                - transfer_money
      - user: Marco Bianchi
        assertions:
          - slot_was_set:
              - name: recipient_name
                value: Marco Bianchi
      - user: forget it, cancel the whole thing
        assertions:
          - flow_cancelled:
              flow_id: transfer_money
